<form action="" class="login-form" [formGroup]="form" (ngSubmit)="onSubmit()">
    <h1 class="h1 mb60">Вход</h1>

    <label class="tt-control-label mb16">
        Telegram Username
        <input
            class="tt-input"
            type="text"
            placeholder="Введите логин"
            formControlName="username"
        />
    </label>
    <label class="tt-control-label mb32">
        <div class="password-input">
            Пароль
            <input
                class="tt-input"
                [type]="isPasswordVisible() ? 'text' : 'password'"
                placeholder="Введите пароль"
                formControlName="password"
            />
            <button
                type="button"
                class="password-eye-btn"
                (click)="isPasswordVisible.set(!isPasswordVisible())"
            >
                <img src="/assets/imgs/eye.png" alt="" />
            </button>
        </div>
    </label>

    <button class="btn btn-shadow" type="submit">Войти</button>
</form>

<img src="/assets/svg/logo-big.svg" alt="" />
